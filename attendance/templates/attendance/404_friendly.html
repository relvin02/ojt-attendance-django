{% extends 'attendance/base.html' %}

{% block content %}
  <div class="container" style="max-width:900px;">
    <div class="row justify-content-center align-items-center" style="min-height:65vh;">
      <div class="col-12 text-center">
        <div class="mb-4">
          <!-- simple padlock + doc icon similar to Facebook's look -->
          <svg width="96" height="96" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect x="3" y="7" width="18" height="13" rx="2" fill="#e9eef8"/>
            <path d="M7 7V6a5 5 0 0 1 10 0v1" stroke="#6b7bd1" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            <rect x="8" y="10" width="8" height="6" rx="1" fill="#fff" stroke="#d6defa"/>
          </svg>
        </div>

        <h1 class="h3 fw-semibold">This content isn't available right now</h1>
        <p class="text-muted mt-2" style="max-width:680px;margin:0 auto;">
          When this happens, it's usually because the owner only shared it with a small group of people, changed who can see it, or it has been removed.
        </p>

        <div class="mt-4">
          <a href="/" class="btn btn-primary btn-lg me-3">Go to Feed</a>
          <a href="javascript:history.back()" class="text-primary d-inline-block mt-2">Go back</a>
          <span class="mx-2 text-muted">|</span>
          <a href="/help/" class="text-primary d-inline-block mt-2">Visit Help Center</a>
        </div>
      </div>
    </div>
  </div>

  <style>
    /* Slightly tone down page background to mimic the focused empty state */
    body .container { /* scoped tweak so other pages don't change much */ }
  </style>
{% endblock %}
